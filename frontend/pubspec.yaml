name: project_management_tool
description: "A Project Management Tool built with Flutter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0  # For using Google Fonts
  flutter_animate: ^4.5.2
  dropdown_search: ^6.0.2
  go_router: ^16.2.1
  provider: ^6.1.5+1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true